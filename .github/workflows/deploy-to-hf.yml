name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main   # or "master", whichever branch you use

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up git
        run: |
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"

      - name: Configure Hugging Face authentication
        run: |
          git config --global credential.helper store
          echo "https://sba-btw:${{ secrets.HF_TOKEN }}@huggingface.co" > ~/.git-credentials

      - name: Push to Hugging Face Space
        run: |
          git clone https://huggingface.co/spaces/sba-btw/GeoClustering-API
          cd GeoClustering-API
          rsync -av --exclude='.git' ../ . 
          git add .
          git commit -m "Sync from GitHub" || echo "No changes"
          git push
